{% extends 'hostel/base.html' %}
{% block content %}
<h2>All Leave Requests</h2>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Student</th>
      <th>Period</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for l in leaves %}
      <tr>
        <td>{{ l.student }}</td>
        <td>{{ l.start_date }} - {{ l.end_date }}</td>
        <td>{{ l.get_status_display }}</td>
        <td><a href="{% url 'approve_leave' l.pk %}" class="btn btn-sm btn-primary">View</a></td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No leave requests.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

{% extends 'hostel/base.html' %}
{% block content %}
<h2>Update Maintenance Request</h2>
<form method="post">
  {% csrf_token %}
  <div class="mb-3">
    <label>Status</label>
    <select name="status" class="form-control">
      {% for key,val in request_obj.STATUS_CHOICES %}
        <option value="{{ key }}" {% if request_obj.status==key %}selected{% endif %}>{{ val }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label>Assign Staff</label>
    <select name="assigned_staff" class="form-control">
      <option value="">-- none --</option>
      {% for u in staff_users %}
        <option value="{{ u.pk }}" {% if request_obj.assigned_staff and request_obj.assigned_staff.pk==u.pk %}selected{% endif %}>{{ u.username }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label>Estimated Resolution Time</label>
    <input type="datetime-local" name="estimated_resolution_time" class="form-control" value="{% if request_obj.estimated_resolution_time %}{{ request_obj.estimated_resolution_time|date:'Y-m-d\TH:i' }}{% endif %}">
  </div>
  <button class="btn btn-primary">Save</button>
</form>
{% endblock %}

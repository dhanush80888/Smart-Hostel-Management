{% extends 'hostel/base.html' %}

{% block content %}
<h2>Attendance Report</h2>
<form class="mb-3" method="get">
    <label for="date">Select date:</label>
    <input type="date" name="date" id="date" value="{{ report_date }}" class="form-control d-inline-block w-auto">
    <button class="btn btn-primary">Go</button>
</form>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Meal</th>
            <th>Status</th>
            <th>Count</th>
        </tr>
    </thead>
    <tbody>
        {% for row in summary %}
            <tr>
                <td>{{ row.meal_type }}</td>
                <td>{{ row.status }}</td>
                <td>{{ row.count }}</td>
            </tr>
        {% empty %}
            <tr><td colspan="3">No attendance records for this date.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

{% extends 'hostel/base.html' %}
{% block content %}
<h2>Electricity Usage</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary">Record Usage</button>
</form>
<hr>
<h3>History</h3>
<table class="table table-sm">
  <thead>
    <tr><th>Month</th><th>Units</th><th>Cost</th><th>Recorded</th></tr>
  </thead>
  <tbody>
    {% for u in usages %}
      <tr>
        <td>{{ u.month }}</td>
        <td>{{ u.units }}</td>
        <td>{{ u.cost }}</td>
        <td>{{ u.created_at|date:'M d, Y' }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No records.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

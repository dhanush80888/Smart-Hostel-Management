{% extends 'hostel/base.html' %}
{% load static %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h4><i class="fas fa-user-plus"></i> Register Visitor</h4>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="visitor_name" class="form-label">Visitor Name *</label>
                <input type="text" class="form-control" id="visitor_name" name="visitor_name" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="phone_number" class="form-label">Phone Number *</label>
                <input type="tel" class="form-control" id="phone_number" name="phone_number" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="purpose" class="form-label">Purpose of Visit *</label>
              <textarea class="form-control" id="purpose" name="purpose" rows="3" required></textarea>
            </div>
            <div class="row">
              <div class="col-md-4 mb-3">
                <label for="visiting_date" class="form-label">Visiting Date *</label>
                <input type="date" class="form-control" id="visiting_date" name="visiting_date" required>
              </div>
              <div class="col-md-4 mb-3">
                <label for="expected_entry_time" class="form-label">Expected Entry Time *</label>
                <input type="time" class="form-control" id="expected_entry_time" name="expected_entry_time" required>
              </div>
              <div class="col-md-4 mb-3">
                <label for="expected_exit_time" class="form-label">Expected Exit Time *</label>
                <input type="time" class="form-control" id="expected_exit_time" name="expected_exit_time" required>
              </div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i> Submit Request
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
